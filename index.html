<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Eugen Matković - Creative Design Portfolio</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: #0D1F4C;
            color: #fff;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 20px;
        }
        
        .container {
            text-align: center;
            max-width: 600px;
        }
        
        h1 {
            font-size: clamp(48px, 8vw, 72px);
            margin-bottom: 20px;
            letter-spacing: -1px;
            font-weight: 700;
        }
        
        .subtitle {
            font-size: 18px;
            color: rgba(255, 255, 255, 0.7);
            margin-bottom: 40px;
            line-height: 1.6;
        }
        
        .cta-button {
            display: inline-block;
            padding: 16px 48px;
            background: #fff;
            color: #0D1F4C;
            text-decoration: none;
            border-radius: 4px;
            font-weight: 600;
            font-size: 16px;
            letter-spacing: 1px;
            transition: all 0.3s ease;
            margin: 10px;
        }
        
        .cta-button:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.3);
        }
        
        .cta-button.secondary {
            background: transparent;
            color: #fff;
            border: 1px solid rgba(255, 255, 255, 0.3);
        }
        
        .cta-button.secondary:hover {
            border-color: rgba(255, 255, 255, 0.7);
            background: rgba(255, 255, 255, 0.05);
        }
        
        .links {
            margin-top: 60px;
            display: flex;
            justify-content: center;
            gap: 20px;
            flex-wrap: wrap;
        }
        
        .footer {
            margin-top: 80px;
            padding-top: 40px;
            border-top: 1px solid rgba(255, 255, 255, 0.1);
            font-size: 14px;
            color: rgba(255, 255, 255, 0.5);
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Eugen Matković</h1>
        <p class="subtitle">Creative Designer & Web Developer based in Berlin, Germany. Specializing in immersive digital experiences and innovative design solutions.</p>
        
        <div class="links">
            <a href="Portfolio.dc.html" class="cta-button">View Full Portfolio</a>
            <a href="https://github.com/ematkovichh" class="cta-button secondary" target="_blank">GitHub</a>
        </div>
        
        <div class="footer">
            <p>&copy; 2026 Eugen Matković. All rights reserved.</p>
            <p style="margin-top: 10px;">Based in Berlin, Germany</p>
        </div>
    </div>
</body>
</html>
